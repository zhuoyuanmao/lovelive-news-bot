name: Fetch Lovelive Tweets

on:
  schedule:
    # 正式每天 21:00 JST = 12:00 UTC
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 手动触发调试

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 git 历史以便 push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run fetch script
        run: python fetch_lovelive.py

      - name: Commit and push news.json
        if: github.event_name != 'push'  # 避免无限循环
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git commit -m "Update news.json [GitHub Actions]" || echo "No changes to commit"
          git push
